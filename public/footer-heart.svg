    <path class="heart" d="M8.5 1.5L9.5 0.5L10.5 1.5" stroke="#030712" stroke-width="0.3" fill="none"/>
    <path class="heart" d="M6.5 4.5L7.5 5.5L8.5 4.5" stroke="#030712" stroke-width="0.3" fill="none"/>
    <path class="heart" d="M6 6L7 7L8 6" stroke="#030712" stroke-width="0.2" fill="none"/>
  </g>
</svg>